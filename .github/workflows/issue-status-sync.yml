name: Issue Status Sync

on:
  create:
  delete:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, closed]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Synchronize local issue status
        uses: actions/github-script@v7
        with:
          script: |
            const pattern = /^[a-z][a-z0-9-]*\/(?:(?<repository>[a-z0-9][a-z0-9._-]*)-)?(?<number>[1-9][0-9]*)-[a-z0-9][a-z0-9-]*$/;
            const pull = context.payload.pull_request;
            const branch = pull?.head?.ref ?? context.payload.ref;
            const match = typeof branch === 'string' ? branch.match(pattern) : null;
            if (!match) return;
            if (match.groups.repository) {
              core.info(`${branch}: cross-repository lifecycle mutation skipped.`);
              return;
            }
            const issueNumber = Number(match.groups.number);
            const titleNumber = pull?.title?.match(/^#([1-9][0-9]*)\s+/)?.[1];
            if (titleNumber && Number(titleNumber) !== issueNumber) {
              core.setFailed('Branch and pull-request ticket numbers differ.');
              return;
            }
            const active = new Set(['opened', 'reopened', 'synchronize', 'ready_for_review']);
            if (context.eventName === 'create' || active.has(context.payload.action)) {
              const issue = await github.rest.issues.get({
                ...context.repo,
                issue_number: issueNumber,
              });
              const labels = issue.data.labels
                .map((label) => typeof label === 'string' ? label : label.name)
                .filter((label) => label && !label.startsWith('status:'));
              labels.push('status:in-progress');
              await github.rest.issues.update({
                ...context.repo,
                issue_number: issueNumber,
                state: 'open',
                labels,
              });
              return;
            }
            const merged = context.payload.action === 'closed' && pull?.merged === true;
            const deleted = context.eventName === 'delete';
            if (!merged && !deleted) return;
            const openPulls = await github.paginate(github.rest.pulls.list, {
              ...context.repo,
              state: 'open',
              per_page: 100,
            });
            const remainsOpen = openPulls.some((item) => {
              const itemBranch = item.head?.ref?.match(pattern);
              const itemTitle = item.title?.match(/^#([1-9][0-9]*)\s+/)?.[1];
              return !itemBranch?.groups?.repository
                && (itemBranch?.groups?.number === String(issueNumber)
                  || itemTitle === String(issueNumber));
            });
            if (remainsOpen) return;
            await github.rest.issues.update({
              ...context.repo,
              issue_number: issueNumber,
              state: 'closed',
              state_reason: 'completed',
            });
