name: Actionlint Diagnostic

on:
  push:
    branches:
      - automation/dependency-security-releases-20260625
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run actionlint without failing
        id: lint
        uses: devops-actions/actionlint@v0.1.11
        with:
          fail-on-errors: "false"

      - name: Upload actionlint findings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: actionlint-findings
          path: actionlint-errors.json
          if-no-files-found: error
