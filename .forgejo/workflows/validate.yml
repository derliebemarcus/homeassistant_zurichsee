name: Validate HACS & Hassfest

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  validate-hacs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: https://data.forgejo.org/actions/checkout@v6

      - name: HACS validation
        uses: https://github.com/hacs/action@main
        with:
          category: integration

  validate-hassfest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: https://data.forgejo.org/actions/checkout@v6

      - name: Home Assistant Hassfest
        uses: https://github.com/home-assistant/actions/hassfest@master
