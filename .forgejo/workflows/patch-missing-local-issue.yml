name: Patch missing local issue handling

on:
  push:
    branches:
      - bugfix/homeassistant_zurichsee-108-missing-issue-sync

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4
        with:
          ref: bugfix/homeassistant_zurichsee-108-missing-issue-sync
          fetch-depth: 0
      - name: Make issue sync cross-repository safe
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          path = Path('.forgejo/workflows/issue-status-sync.yml')
          text = path.read_text(encoding='utf-8')
          text = text.replace('async function request(method, path, body) {', 'async function request(method, path, body, allowNotFound = false) {')
          text = text.replace('            if (!response.ok) {\n', '            if (allowNotFound && response.status === 404) return null;\n            if (!response.ok) {\n', 1)
          marker = '''            const issuePath = `/repos/${repositoryPath}/issues/${issueNumber}`;
            const action = payload.action;

'''
          replacement = marker + '''            const issue = await request("GET", issuePath, undefined, true);
            if (!issue) {
              console.log(`Skipping issue status sync: local issue #${issueNumber} does not exist.`);
              return;
            }

'''
          if marker not in text:
              raise SystemExit('issue path marker not found')
          text = text.replace(marker, replacement, 1)
          text = text.replace('              const issue = await request("GET", issuePath);\n', '', 1)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit patch and remove helper
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'ChatGPT MCP'
          git config user.email 'chatgpt-mcp@home.siczb.de'
          git rm .forgejo/workflows/patch-missing-local-issue.yml
          git add .forgejo/workflows/issue-status-sync.yml
          git commit -m '#108 Skip issue sync when local issue is absent'
          git push origin HEAD:bugfix/homeassistant_zurichsee-108-missing-issue-sync
